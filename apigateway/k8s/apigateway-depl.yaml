apiVersion: apps/v1
kind: Deployment

metadata:
  name: apigateway-deployment
  namespace: lgcns

spec:
  # 자원공간의 낭비를 방지하고 관리의 편의성을 제공해주는 옵션 
  revisionHistoryLimit: 2
  replicas: 1
  selector:   
    matchLabels:
      app: apigateway   # 서비스가 라우팅할 때 찾는 이름 

  template:
    metadata:
      labels:
        app: apigateway   # 스펙의 이름 
    spec:
      containers:
        - name: apigateway-container
          # ecr 경로
          image: 933090817123.dkr.ecr.ap-south-1.amazonaws.com/apigateway   
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service

metadata:
  name: apigateway-service
  namespace: lgcns

spec:
  type: ClusterIP
  selector:
    app: apigateway
  # port forwarding 
  ports:
    - port: 80
      targetPort: 8080