apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-deployment
  namespace: lgcns

spec:
  # 자원공간의 낭비를 방지하고 관리의 편의성을 제공해주는 옵션 
  revisionHistoryLimit: 2
  replicas: 1
  selector:   
    matchLabels:
      app: order  # 서비스가 라우팅할 때 찾는 이름 

  template:
    metadata:
      labels:
        app: order   # 스펙의 이름 
    spec:
      containers:
        - name: order-container
          # ecr 경로
          image: 9933090817123.dkr.ecr.ap-south-1.amazonaws.com/order-service
          ports:
            - containerPort: 8080
          resources:  # auto-scaling
            # 컨테이너가 사용할 수 있는 최대치의 리소스
            limits:
              cpu: "1"
              memory: "500Mi"
            # 컨테이너가 기동할 때 보장 받는 최소 리소스 
            requests:
              cpu: "0.5"
              memory: "500Mi"
          
          # k8s-secret에 설정한 정보를 외부변수로 appliation.yaml에 전달하는 작업
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_HOST

            - name: DB_ADMIN
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_ADMIN    

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_PASSWORD

---
apiVersion: v1
kind: Service

metadata:
  name: order-service
  namespace: lgcns

spec:
  type: ClusterIP
  selector:
    app: order
  # port forwarding 
  ports:
    - port: 80
      targetPort: 8080