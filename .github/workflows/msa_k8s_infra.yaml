name: msa eks infra deploy

on:
  # 변경되어 push되더라도 이벤트로 동작하지 않음 -> git actions 화면에서 수동으로 실행필요 @! 
  workflow_dispatch:

jobs:
  # job name
  build-and-deploy:
    # runner (OS 설치 작업)
    runs-on: ubuntu-latest

    steps:
      # 소스코드 checkout
      - name: checkout github
        uses: actions/checkout@v2 

      # 리눅스 환경에서 kubectl client 설치
      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"

      # aws 인증 
      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ap-south-1

      # eks 클러스터와 연결 
      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-south-1 --name lgcns-wlguss-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      # image 빌드를 위한 인프라 구축(ingress, kafka, redis, zookeeper, rabbitMQ)
      - name: deploy infra
        run: |  # 멀티라인의 리눅스 명령어 사용 
          kubectl apply -f ./k8s/msa_ingress.yaml
          kubectl apply -f ./k8s/msa_redis.yaml
          kubectl apply -f ./k8s/msa_zookeeper.yaml
          kubectl apply -f ./k8s/msa_kafka.yaml


