apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-deployment
  namespace: lgcns

spec:
  # 자원공간의 낭비를 방지하고 관리의 편의성을 제공해주는 옵션 
  revisionHistoryLimit: 2
  replicas: 1
  selector:   
    matchLabels:
      app: user  # 서비스가 라우팅할 때 찾는 이름 

  template:
    metadata:
      labels:
        app: user   # 스펙의 이름 
    spec:
      containers:
        - name: user-container
          # ecr 경로
          image: 933090817123.dkr.ecr.ap-south-1.amazonaws.com/user-service
          ports:
            - containerPort: 8080
          resources:
            # 컨테이너가 사용할 수 있는 최대치의 리소스
            limits:
              cpu: "1"
              memory: "500Mi"
            # 컨테이너가 기동할 때 보장 받는 최소 리소스 
            requests:
              cpu: "0.5"
              memory: "500Mi"
          
          # 추후 수정 필요 
          env:


---
apiVersion: v1
kind: Service

metadata:
  name: user-service
  namespace: lgcns

spec:
  type: ClusterIP
  selector:
    app: user
  # port forwarding 
  ports:
    - port: 80
      targetPort: 8080