# cloud ver. 

# eureka server는 사용하지 않음 bc 클라우드 환경에서는 eureka의 역할을 aws의 pod가 대신함 
eureka:
  client:
    enabled: false

spring:
  application:
    name: user-service    
  
  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=TRUE&requireSSL=true # k8s - secret에 담을 수 있음 
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}

  data:
    redis:
      # pod 실행 중인 redis service 이름으로 변경 
      host: redis-service 
      port: 6379
      password: 
      timeout: 6000ms

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate: 
      # create(-> 서버 기동 시점에 생성된 entity에 매핑되는 테이블 자동 생성), create-drop, update, none
      ddl-auto:  create
    # 콘솔출력
    show-sql: true  

jwt:
  secret: wlguss-jihyun-springsecurity-key-test-forjwtprovider-134679
